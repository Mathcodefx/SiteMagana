<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio</title>
    
    <!-- Adicione o link para os arquivos CSS do Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <!-- Adicione seu arquivo de estilos personalizados (opcional) -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Seu Nome</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#sobre">Sobre</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#portfolio">Portfólio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contato">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Slider de Imagens -->
    <div id="slider" class="carousel slide" data-ride="carousel">
        <ol class="carousel-indicators">
            <li data-target="#slider" data-slide-to="0" class="active"></li>
            <li data-target="#slider" data-slide-to="1"></li>
            <li data-target="#slider" data-slide-to="2"></li>
        </ol>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="aa.jpg" alt="Slide 1" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="3.jpg" alt="Slide 2" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="aa.jpg" alt="Slide 3" class="d-block w-100">
            </div>
        </div>
        <a class="carousel-control-prev" href="#slider" role="button" data-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="sr-only">Anterior</span>
        </a>
        <a class="carousel-control-next" href="#slider" role="button" data-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="sr-only">Próximo</span>
        </a>
    </div>

    <!-- Sobre Mim -->
    <section id="sobre" class="py-5">
        <div class="container">
            <div class="row">
                <div class="col-lg-6">
                    <h2 class="display-4">Sobre Mim</h2>
                    <p>Uma breve descrição sobre você e suas habilidades.</p>
                </div>
                <div class="col-lg-6">
                    <!-- Adicione uma imagem sua aqui -->
                    <img src="sua-imagem.jpg" alt="Sua Imagem" class="img-fluid rounded-circle">
                </div>
            </div>
        </div>
    </section>

    <!-- Meu Portfólio -->
    <section id="portfolio" class="py-5">
        <div class="container">
            <h2 class="display-4">Meu Portfólio</h2>
            <!-- Adicione exemplos de seu trabalho usando colunas -->
            <div class="row">
                <div class="col-lg-4 col-md-6 mb-4">
                    <div class="card">
                        <img src="projeto1.jpg" alt="Projeto 1" class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Projeto 1</h5>
                            <p class="card-text">Descrição do projeto 1.</p>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4 col-md-6 mb-4">
                    <div class="card">
                        <img src="projeto2.jpg" alt="Projeto 2" class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Projeto 2</h5>
                            <p class="card-text">Descrição do projeto 2.</p>
                        </div>
                    </div>
                </div>
                <!-- Adicione mais projetos conforme necessário -->
            </div>
        </div>
    </section>

    <!-- Contato -->
    <section id="contato" class="py-5 bg-light">
        <div class="container">
            <h2 class="display-4">Contato</h2>
            <p>Entre em contato comigo pelo e-mail: <a href="mailto:seuemail@example.com">seuemail@example.com</a></p>
        </div>
    </section>

    <!-- Rodapé -->
    <footer class="py-4 bg-dark text-white text-center">
        <div class="container">
            <p>&copy; 2023 Seu Nome</p>
        </div>
    </footer>

    <!-- Adicione o link para os arquivos JavaScript do Bootstrap -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
